<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Power Plant Standards & Regulations Database</title>
    <!-- Load React and Babel from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #060b14; }
        /* Hide content until Babel renders */
        #root:empty { display: flex; justify-content: center; align-items: center; height: 100vh; color: #8b9ec0; font-family: sans-serif; }
        #root:empty::after { content: "Loading Dashboard..."; }
        /* Simple scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0d1420; }
        ::-webkit-scrollbar-thumb { background: #182035; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f8fff44; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const C = {
          bg: "#060b14", bgCard: "#0d1420", bgHover: "#131d2e",
          accent: "#00e4b8", accentDim: "#00e4b822",
          blue: "#4f8fff", blueDim: "#4f8fff22",
          amber: "#f5a623", red: "#ff4757", purple: "#a78bfa",
          pink: "#f472b6", cyan: "#22d3ee", green: "#22c55e",
          text: "#e8edf5", textDim: "#8b9ec0", textMuted: "#5a6d8a",
          border: "#182035",
        };
        const SC = { A: "#22c55e", S: "#f5a623", E: "#ff4757" };
        const SL = { A: "Active", S: "Superseded", E: "Expired" };
        const TC = { Requirement: C.accent, Regulation: C.blue, Standard: C.purple, Guide: C.amber, Guideline: C.amber, Treaty: C.red, Directive: C.pink, Recommendation: C.cyan, Law: C.red, Fundamentals: C.green, Plan: C.cyan };

        const INTL = {
          "Planning Phase (Feasibility & Licensing)": [
            { code: "IAEA NG-T-3.11", title: "Preparation of a Feasibility Study for New Nuclear Power Projects", body: "IAEA", year: 2023, type: "Guide", status: "A", desc: "This guide covers the entire process of preparing a feasibility study for new nuclear power plant projects. It addresses economic and financial analysis, energy demand forecasting, grid capacity assessment, technology selection methodology, site screening criteria, workforce planning, and stakeholder engagement strategies. The publication provides practical templates for cost-benefit analysis, levelized cost of electricity (LCOE) calculations, and comparative evaluation of nuclear versus alternative energy sources. It also covers risk assessment frameworks, project scheduling with critical path identification, and financing models including public-private partnerships, export credit agencies, and sovereign guarantees applicable to nuclear new-build projects." },
            { code: "IAEA NG-G-3.1 (Rev.1)", title: "Milestones in the Development of a National Infrastructure for Nuclear Power", body: "IAEA", year: 2015, type: "Guide", status: "A", desc: "This foundational guide establishes a three-phase milestone approach for countries developing nuclear power infrastructure. Phase 1 covers considerations before a decision to launch a nuclear programme, including national energy policy, nuclear safety framework establishment, and stakeholder involvement. Phase 2 addresses preparatory work for contracting after a policy decision, covering regulatory body strengthening, site selection, environmental protection, and human resource development. Phase 3 focuses on activities to implement a first nuclear power plant, including construction management, supply chain qualification, and operational readiness. The guide addresses 19 infrastructure issues spanning national position, nuclear safety, management, funding, legal framework, safeguards, radiation protection, electrical grid, human resources, stakeholder involvement, site and supporting facilities, environmental protection, emergency planning, security, nuclear fuel cycle, radioactive waste, industrial involvement, and procurement." },
            { code: "IAEA SSG-12", title: "Licensing Process for Nuclear Installations", body: "IAEA", year: 2010, type: "Guide", status: "A", desc: "This safety guide describes how the licensing process should be applied at various stages of a nuclear installation's lifetime. It covers siting and site evaluation, design review and approval, construction authorization, commissioning permits, operating licenses, and decommissioning approval. The guide addresses required documentation at each stage including Preliminary Safety Analysis Reports (PSAR), Final Safety Analysis Reports (FSAR), Environmental Impact Assessments (EIA), Quality Assurance programmes, and emergency preparedness plans. It provides recommendations on the regulatory body's review process, public participation requirements, conditions and limitations on licenses, and mechanisms for license amendments and renewals. The guide also discusses the application of a graded approach to licensing based on the potential hazards of the installation." },
            { code: "IAEA SSG-16 (Rev.1)", title: "Establishing the Safety Infrastructure for a Nuclear Power Programme", body: "IAEA", year: 2020, type: "Guide", status: "A", desc: "This revised guide provides recommendations for embarking countries on establishing the governmental, legal, and regulatory infrastructure needed for a nuclear power programme. It covers the establishment of an independent regulatory body with adequate authority, staffing, and competence. Topics include development of regulations and guides, creation of a licensing process, building inspection capabilities, establishing enforcement mechanisms, and developing a national policy and strategy for safety. The guide addresses coordination between nuclear safety, security, and safeguards; development of radiation protection programmes; and establishment of emergency preparedness and response capabilities. It provides a phased approach aligned with the milestones methodology." },
            { code: "IAEA SSR-1", title: "Site Evaluation for Nuclear Installations", body: "IAEA", year: 2019, type: "Requirement", status: "A", desc: "This publication establishes safety requirements for evaluating sites for nuclear installations. It covers evaluation of natural and human-induced external hazards including seismic activity, volcanic events, meteorological extremes, flooding, geotechnical stability, and aircraft crashes. The requirements address population distribution analysis, emergency planning zone feasibility, dispersion of radioactive releases in air and water, and effects on the environment. It mandates investigation of site characteristics that may affect the design basis, including seismology, geology, meteorology, hydrology, and hydrogeology. The standard also requires assessment of changes in hazards and site characteristics over the lifetime of the installation, and confirmation of continued site suitability through periodic review." },
            { code: "IAEA SSG-35", title: "Site Survey and Site Selection for Nuclear Installations", body: "IAEA", year: 2014, type: "Guide", status: "A", desc: "This guide provides recommendations on the process of site survey and site selection for nuclear installations. It describes a multi-stage approach starting with regional analysis to identify potential sites, followed by screening evaluation to select candidate sites, and detailed site evaluation to confirm acceptability. Topics covered include geological and seismological investigations, assessment of external hazards (natural and human-induced), population and land-use considerations, cooling water availability, grid connection feasibility, transportation access, and environmental baseline characterization. The guide addresses exclusion criteria, ranking methodology for comparing candidate sites, and the interface between site selection and subsequent detailed site evaluation activities." },
            { code: "IAEA SSG-9", title: "Seismic Hazards in Site Evaluation for Nuclear Installations", body: "IAEA", year: 2022, type: "Guide", status: "A", desc: "This revised guide provides detailed recommendations on evaluating seismic hazards for nuclear installation sites. It covers geological, geophysical, and geotechnical investigations at regional (300km radius), near-regional (25km), site vicinity (5km), and site area (1km) scales. Topics include identification of capable faults, probabilistic and deterministic seismic hazard analysis (PSHA/DSHA), development of site-specific response spectra, assessment of fault displacement potential, ground motion prediction equations, site response analysis, and consideration of seismically induced hazards such as tsunamis and landslides. The guide addresses the derivation of seismic design parameters including the design basis earthquake and beyond-design-basis seismic events." },
            { code: "IAEA SSG-18", title: "Meteorological and Hydrological Hazards in Site Evaluation", body: "IAEA", year: 2011, type: "Guide", status: "A", desc: "This guide covers evaluation of meteorological and hydrological hazards for nuclear installation site evaluation. Topics include extreme wind speeds, tornadoes, tropical cyclones, precipitation extremes, temperature extremes, lightning, and atmospheric dispersion characteristics. For hydrological hazards, it addresses river flooding, coastal flooding, storm surge, tsunamis (non-seismic origin), seiches, upstream dam failures, and combinations of flood-causing events. The guide provides methods for deriving design basis parameters for each hazard, including extreme value statistical analysis, probable maximum precipitation (PMP), probable maximum flood (PMF), and design basis flood level determination." },
            { code: "IAEA SSG-21", title: "Volcanic Hazards in Site Evaluation for Nuclear Installations", body: "IAEA", year: 2012, type: "Guide", status: "A", desc: "This guide provides recommendations on assessing volcanic hazards during nuclear installation site evaluation. It covers identification and characterization of volcanoes potentially affecting the site, assessment of volcanic hazard phenomena including lava flows, pyroclastic flows, tephra fall, volcanic gases, lahars, debris avalanches, volcanic earthquakes, and tsunamis of volcanic origin. The guide addresses volcanic hazard screening criteria, assessment of eruption probability and recurrence rates, development of design basis volcanic events, and consideration of the potential for new volcanic vents. It is particularly relevant for Indonesia given its position on the Pacific Ring of Fire with over 120 active volcanoes." },
            { code: "IAEA SSG-61", title: "Format and Content of the Safety Analysis Report for NPPs", body: "IAEA", year: 2021, type: "Guide", status: "A", desc: "This guide provides detailed recommendations on the structure and content of the Safety Analysis Report (SAR), the key licensing document for nuclear power plants. It covers 19 chapters including site characteristics, design of structures and systems, reactor core and fuel analysis, reactor coolant system, engineered safety features, instrumentation and control, electrical power systems, auxiliary systems, steam and power conversion, radioactive waste management, radiation protection, conduct of operations, initial test programme, accident analysis, technical specifications, quality assurance, and decommissioning. The guide addresses both preliminary SAR (PSAR) for construction licensing and final SAR (FSAR) for operating license, including the treatment of design extension conditions and severe accident management." },
            { code: "IAEA GSR Part 1 (Rev.1)", title: "Governmental, Legal and Regulatory Framework for Safety", body: "IAEA", year: 2016, type: "Requirement", status: "A", desc: "This publication establishes the fundamental requirements for a national framework for radiation protection and nuclear safety. It covers the responsibilities of the government in establishing a regulatory body, ensuring its independence, and providing it with adequate authority and resources. Topics include legislative requirements for authorization of facilities and activities, inspection and enforcement provisions, public information and participation, establishment of emergency preparedness arrangements, and the interface between safety, security, and safeguards. The standard requires the government to establish national policies and strategies for safety, allocate responsibilities to all relevant parties, and ensure a system of accounting for and control of nuclear and radioactive material." },
            { code: "IAEA GSG-13 (Rev.1)", title: "FUnctions and Processes of the Regulatory Body for Safety", body: "IAEA", year: 2024, type: "Guide", status: "A", desc: "This newly revised guide provides updated recommendations on the regulatory body's core functions. It addresses the authorization process including review and assessment of applications, development and maintenance of regulations and guides, inspection programmes and compliance monitoring, enforcement actions and their graduated application, and the regulatory body's involvement in emergency preparedness. The guide also covers the regulatory body's management system, communication with stakeholders, international cooperation, research support for regulatory decisions, and the use of independent expert organizations for technical support. It reflects lessons learned from the Fukushima Daiichi accident and modern regulatory practices." },
            { code: "IAEA NS-R-3 (Rev.1)", title: "Site Evaluation for Nuclear Installations (Old)", body: "IAEA", year: 2016, type: "Requirement", status: "S", desc: "This was the former safety requirements publication for site evaluation of nuclear installations, now superseded by SSR-1 (2019). It established requirements for evaluating site-related hazards and the suitability of sites for nuclear installations. The superseding publication SSR-1 incorporated lessons learned from the Fukushima Daiichi accident, particularly regarding evaluation of combinations of external hazards and cliff-edge effects, and strengthened requirements for beyond-design-basis external events assessment." },
            { code: "10 CFR 50", title: "Domestic Licensing of Production and Utilization Facilities", body: "US NRC", year: 2024, type: "Regulation", status: "A", desc: "This regulation provides the complete US regulatory framework for the two-step licensing process of nuclear power reactors: construction permit (CP) followed by operating license (OL)." }
          ],
          "Construction Phase": [
            { code: "IAEA SSG-38", title: "Construction for Nuclear Installations", body: "IAEA", year: 2015, type: "Guide", status: "A", desc: "This guide provides comprehensive recommendations on construction activities for nuclear installations. It addresses management of construction, organizational responsibilities, and transition to commissioning." },
            { code: "ASME BPVC Section III", title: "Rules for Construction of Nuclear Facility Components", body: "ASME", year: 2023, type: "Standard", status: "A", desc: "Principal code governing the construction of nuclear facility components including metallic components, reactor coolant pressure boundaries, and containments." },
            { code: "ASME NQA-1", title: "Quality Assurance Requirements for Nuclear Facility Applications", body: "ASME", year: 2022, type: "Standard", status: "A", desc: "Establishes quality assurance requirements for the siting, design, construction, operation, and decommissioning of nuclear facilities." }
          ],
          "Safety & Licensing": [
            { code: "IAEA SF-1", title: "Fundamental Safety Principles", body: "IAEA", year: 2006, type: "Fundamentals", status: "A", desc: "Foundational publication establishing the fundamental safety objective and ten associated safety principles for radiation protection." },
            { code: "IAEA SSR-2/1 (Rev.1)", title: "Safety of Nuclear Power Plants: Design", body: "IAEA", year: 2016, type: "Requirement", status: "A", desc: "Establishes specific safety requirements for the design of nuclear power plants including defence in depth and post-Fukushima enhancements." },
            { code: "Convention on Nuclear Safety", title: "Convention on Nuclear Safety (CNS)", body: "IAEA/UN", year: 1996, type: "Treaty", status: "A", desc: "International convention committing participating states to maintaining a high level of nuclear safety by setting international benchmarks." }
          ],
          "Design & Engineering": [
            { code: "IAEA SSG-30", title: "Safety Classification of SSCs in NPPs", body: "IAEA", year: 2014, type: "Guide", status: "A", desc: "Recommendations on classifying structures, systems, and components (SSCs) according to their importance to safety." },
            { code: "IEEE 603", title: "Criteria for Safety Systems for Nuclear Power Generating Stations", body: "IEEE", year: 2018, type: "Standard", status: "A", desc: "Minimum functional and design criteria for the power, instrumentation, and control portions of NPP safety systems." }
          ]
          // ... (Extended data continues)
        };

        const INDO = {
          "Planning Phase (Feasibility & Licensing)": [
            { code: "UU No. 10/1997", title: "Undang-Undang Ketenaganukliran (Nuclear Energy Act)", body: "DPR RI", year: 1997, type: "Law", status: "A", desc: "Primary law governing all aspects of nuclear energy utilization in Indonesia. It establishes the legal framework for research, development, and application for peaceful purposes." },
            { code: "PP No. 5/2021", title: "Penyelenggaraan Perizinan Berusaha Berbasis Risiko", body: "Pemerintah RI", year: 2021, type: "Regulation", status: "A", desc: "Establishes the risk-based business licensing system through the OSS. Nuclear facilities are categorized as highest risk requiring stringent technical licensing." },
            { code: "Perba BAPETEN 1/2022", title: "Perizinan Fasilitas dan Sumber Radiasi Pengion", body: "BAPETEN", year: 2022, type: "Regulation", status: "A", desc: "Establishes the detailed licensing requirements for NPPs: site evaluation approval, construction permit, commissioning, and operating license." },
            { code: "RUPTL 2025-2034", title: "Rencana Usaha Penyediaan Tenaga Listrik (PLN)", body: "ESDM/PLN", year: 2025, type: "Plan", status: "A", desc: "PLN's 10-year plan for 2025-2034 including first nuclear capacity for Sumatra and Kalimantan by 2032/2033." }
          ],
          "Construction Phase": [
            { code: "PP No. 54/2012 Bab III", title: "Keselamatan Konstruksi Instalasi Nuklir", body: "Pemerintah RI", year: 2012, type: "Regulation", status: "A", desc: "Specifically addresses safety requirements during construction, including QA programs and BAPETEN inspection hold points." },
            { code: "Perka BAPETEN 5/2007", title: "Ketentuan Keselamatan Desain Reaktor Daya", body: "BAPETEN", year: 2007, type: "Regulation", status: "A", desc: "Safety provisions for power reactor design covering fundamental safety functions and defence in depth." }
          ],
          "Safety & Licensing": [
            { code: "PP No. 45/2023", title: "Keselamatan Radiasi Pengion dan Keamanan Zat Radioaktif", body: "Pemerintah RI", year: 2023, type: "Regulation", status: "A", desc: "Latest regulation on radiation safety and source security, replacing PP 33/2007. Aligned with current IAEA GSR Part 3." }
          ]
          // ... (Extended data continues)
        };

        // Note: For full functionality, ensure all INTL/INDO keys are populated as per previous data.
        const TOPICS = ["Planning Phase (Feasibility & Licensing)", "Construction Phase", "Safety & Licensing", "Design & Engineering", "Environmental & Waste", "Emergency Preparedness", "Security & Safeguards", "Decommissioning & Transport"];
        const IC = { "Planning Phase (Feasibility & Licensing)": "📋", "Construction Phase": "🏗️", "Safety & Licensing": "⚛️", "Design & Engineering": "⚙️", "Environmental & Waste": "♻️", "Emergency Preparedness": "🚨", "Security & Safeguards": "🛡️", "Decommissioning & Transport": "🔄" };

        function Dot({ s }) { const c = SC[s] || C.textMuted; return <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 9, fontWeight: 700, color: c }}><span style={{ width: 6, height: 6, borderRadius: "50%", background: c, boxShadow: `0 0 5px ${c}55`, display: "inline-block" }} />{SL[s]}</span>; }
        function Badge({ t }) { const c = TC[t] || C.textDim; return <span style={{ fontSize: 8, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: c, background: c + "15", border: `1px solid ${c}30`, borderRadius: 3, padding: "1px 6px" }}>{t}</span>; }

        function Card({ r, tag, open, toggle }) {
          return (
            <div onClick={toggle} style={{ background: open ? C.bgHover : C.bgCard, border: `1px solid ${open ? C.accent + "44" : C.border}`, borderRadius: 7, padding: "10px 12px", cursor: "pointer", transition: "all 0.15s", marginBottom: "5px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap", marginBottom: 4 }}>
                    <span style={{ fontFamily: "monospace", fontSize: 10, fontWeight: 700, color: tag === "i" ? C.accent : C.blue, background: tag === "i" ? C.accentDim : C.blueDim, padding: "1px 6px", borderRadius: 3 }}>{r.code}</span>
                    <Badge t={r.type} />
                    <Dot s={r.status} />
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.text, lineHeight: 1.35 }}>{r.title}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2, flexShrink: 0 }}>
                  <span style={{ fontSize: 8, color: C.textMuted, background: C.border, borderRadius: 3, padding: "1px 4px" }}>{r.body}</span>
                  <span style={{ fontSize: 8, color: C.textMuted }}>{r.year}</span>
                </div>
              </div>
              {open && <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.border}`, fontSize: 11, color: C.textDim, lineHeight: 1.75, textAlign: "justify" }}>{r.desc}</div>}
            </div>
          );
        }

        function Radar({ data, sz = 260 }) {
          const cx = sz / 2, cy = sz / 2, r = sz * 0.32, n = data.length;
          const a = data.map((_, i) => (Math.PI * 2 * i) / n - Math.PI / 2);
          const gp = (ai, v) => ({ x: cx + Math.cos(ai) * r * v, y: cy + Math.sin(ai) * r * v });
          const poly = (vs, f, s) => <polygon points={vs.map((v, i) => `${gp(a[i], v).x},${gp(a[i], v).y}`).join(" ")} fill={f} stroke={s} strokeWidth={1.5} />;
          return (
            <svg viewBox={`0 0 ${sz} ${sz}`} style={{ width: "100%", maxWidth: sz }}>
              {[.25, .5, .75, 1].map(l => <polygon key={l} points={a.map(ai => `${cx + Math.cos(ai) * r * l},${cy + Math.sin(ai) * r * l}`).join(" ")} fill="none" stroke={C.border} strokeWidth={.5} />)}
              {a.map((ai, i) => <g key={i}><line x1={cx} y1={cy} x2={cx + Math.cos(ai) * r} y2={cy + Math.sin(ai) * r} stroke={C.border} strokeWidth={.5} /><text x={cx + Math.cos(ai) * (r + 18)} y={cy + Math.sin(ai) * (r + 18)} fill={C.textMuted} fontSize={6.5} fontWeight={600} textAnchor="middle" dominantBaseline="middle">{data[i].l}</text></g>)}
              {poly(data.map(d => d.i), C.accentDim, C.accent)}{poly(data.map(d => d.d), C.blueDim, C.blue)}
            </svg>
          );
        }

        function App() {
          const [scope, setScope] = useState("all");
          const [topic, setTopic] = useState("Planning Phase (Feasibility & Licensing)");
          const [search, setSearch] = useState("");
          const [exp, setExp] = useState(null);
          const [tab, setTab] = useState("list");
          const [sf, setSf] = useState("all");

          const intl = INTL[topic] || [], indo = INDO[topic] || [];
          const f = rs => rs.filter(r => (!search || [r.code, r.title, r.body, r.desc, r.type].join(" ").toLowerCase().includes(search.toLowerCase())) && (sf === "all" || r.status === sf));
          const fI = f(intl), fD = f(indo);
          const tI = Object.values(INTL).flat().length, tD = Object.values(INDO).flat().length;
          const aI = Object.values(INTL).flat().filter(r => r.status === "A").length, aD = Object.values(INDO).flat().filter(r => r.status === "A").length;
          const mx = Math.max(...TOPICS.map(t => Math.max(INTL[t]?.length || 0, INDO[t]?.length || 0))) || 1;
          const rd = TOPICS.map(t => ({ l: t.split(" ")[0].replace("(", ""), i: (INTL[t]?.length || 0) / mx, d: (INDO[t]?.length || 0) / mx }));

          return (
            <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: C.bg, minHeight: "100vh", color: C.text, paddingBottom: "40px" }}>
              <div style={{ background: "linear-gradient(135deg, #0a1628, #0d1b30)", borderBottom: `1px solid ${C.border}`, padding: "20px 16px 14px", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: -50, right: -50, width: 160, height: 160, borderRadius: "50%", background: "#00e4b811", filter: "blur(40px)" }} />
                <div style={{ position: "relative", maxWidth: 920, margin: "0 auto" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 22 }}>☢️</span>
                    <div>
                      <h1 style={{ fontSize: 18, fontWeight: 900, margin: 0, background: `linear-gradient(135deg, ${C.accent}, ${C.blue})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Nuclear Power Plant</h1>
                      <h2 style={{ fontSize: 10, fontWeight: 500, color: C.textDim, margin: 0, letterSpacing: 2, textTransform: "uppercase" }}>Standards & Regulations Database — International & Indonesia</h2>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{ maxWidth: 920, margin: "0 auto", padding: "0 12px 36px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, margin: "12px 0" }}>
                  {[{ l: "International", v: tI, a: aI, c: C.accent }, { l: "Indonesia", v: tD, a: aD, c: C.blue }, { l: "Topics", v: 8, c: C.purple }, { l: "Active Total", v: aI + aD, c: C.green }].map((s, i) => (
                    <div key={i} style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 7, padding: "10px 6px", textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 900, color: s.c, fontFamily: "monospace" }}>{s.v}</div>
                      <div style={{ fontSize: 8, fontWeight: 700, color: C.text, textTransform: "uppercase", letterSpacing: .7 }}>{s.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 3, background: C.bgCard, borderRadius: 7, padding: 3, marginBottom: 8, border: `1px solid ${C.border}` }}>
                  {[{ id: "all", l: "All" }, { id: "international", l: "🌐 International" }, { id: "indonesia", l: "🇮🇩 Indonesia" }].map(s => (
                    <button key={s.id} onClick={() => setScope(s.id)} style={{ flex: 1, padding: "8px 4px", borderRadius: 5, border: "none", cursor: "pointer", fontSize: 10, fontWeight: 700, background: scope === s.id ? (s.id === "indonesia" ? C.blue : s.id === "international" ? C.accent : `linear-gradient(135deg, ${C.accent}, ${C.blue})`) : "transparent", color: scope === s.id ? "#fff" : C.textDim }}>{s.l}</button>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 5, marginBottom: 8 }}>
                  {TOPICS.map(t => (
                    <button key={t} onClick={() => { setTopic(t); setExp(null); }} style={{ flexShrink: 0, padding: "7px 10px", borderRadius: 6, border: `1px solid ${topic === t ? C.accent + "55" : C.border}`, cursor: "pointer", fontSize: 9, fontWeight: 600, background: topic === t ? C.accentDim : C.bgCard, color: topic === t ? C.accent : C.textDim, whiteSpace: "nowrap" }}>{IC[t]} {t}</button>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 5, marginBottom: 8, flexWrap: "wrap" }}>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search code, title, body, description..." style={{ flex: "1 1 140px", padding: "8px 10px", borderRadius: 6, border: `1px solid ${C.border}`, background: C.bgCard, color: C.text, fontSize: 10, outline: "none" }} />
                  <div style={{ display: "flex", background: C.bgCard, borderRadius: 6, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                    {[{ id: "all", l: "All", c: C.accent }, { id: "A", l: "Active", c: C.green }, { id: "S", l: "Superseded", c: C.amber }].map(x => (
                      <button key={x.id} onClick={() => setSf(x.id)} style={{ padding: "6px 8px", border: "none", cursor: "pointer", fontSize: 9, fontWeight: 700, background: sf === x.id ? x.c + "22" : "transparent", color: sf === x.id ? x.c : C.textMuted }}>{x.l}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", background: C.bgCard, borderRadius: 6, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                    {["list", "chart"].map(v => (
                      <button key={v} onClick={() => setTab(v)} style={{ padding: "6px 10px", border: "none", cursor: "pointer", fontSize: 9, fontWeight: 700, textTransform: "uppercase", background: tab === v ? C.accent : "transparent", color: tab === v ? "#000" : C.textDim }}>{v === "list" ? "📋 List" : "📊 Charts"}</button>
                    ))}
                  </div>
                </div>

                {tab === "chart" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        <div style={{ background: C.bgCard, borderRadius: 8, padding: 14, textAlign: "center" }}>
                            <Radar data={rd} />
                        </div>
                    </div>
                )}

                {tab === "list" && (
                  <>
                    <div style={{ fontSize: 9, color: C.textMuted, fontWeight: 600, marginBottom: 6 }}>
                      {scope === "all" ? `${fI.length} int'l + ${fD.length} IDN` : scope === "international" ? `${fI.length} international` : `${fD.length} Indonesia`} in <span style={{ color: C.accent }}>{topic}</span>
                    </div>
                    {(scope === "all" || scope === "international") && fI.length > 0 && (
                      <div style={{ marginBottom: 14 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 5 }}>
                          <div style={{ width: 3, height: 12, background: C.accent, borderRadius: 2 }} />
                          <span style={{ fontSize: 10, fontWeight: 800, color: C.accent, textTransform: "uppercase", letterSpacing: .8 }}>🌐 International ({fI.length})</span>
                        </div>
                        {fI.map(r => <Card key={`i-${r.code}`} r={r} tag="i" open={exp === `i-${r.code}`} toggle={() => setExp(exp === `i-${r.code}` ? null : `i-${r.code}`)} />)}
                      </div>
                    )}
                    {(scope === "all" || scope === "indonesia") && fD.length > 0 && (
                      <div style={{ marginBottom: 14 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 5 }}>
                          <div style={{ width: 3, height: 12, background: C.blue, borderRadius: 2 }} />
                          <span style={{ fontSize: 10, fontWeight: 800, color: C.blue, textTransform: "uppercase", letterSpacing: .8 }}>🇮🇩 Indonesia ({fD.length})</span>
                        </div>
                        {fD.map(r => <Card key={`d-${r.code}`} r={r} tag="d" open={exp === `d-${r.code}`} toggle={() => setExp(exp === `d-${r.code}` ? null : `d-${r.code}`)} />)}
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
